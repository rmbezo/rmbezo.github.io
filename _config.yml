title: "fun"          # Измените на своё название
author: "Roman"
email: your@email.com
description: >- 
  Personal blog.
baseurl: ""                     # Для корневого домена оставляем пустым
url: "https://rmbezo.github.io" # Замените username на ваш ник GitHub
github_username:  rmbezo      # Ваш ник на GitHub

# Настройки сборки
markdown: kramdown
kramdown:
  input: GFM                    # Поддержка GitHub Flavored Markdown
  syntax_highlighter: rouge     # Подсветка кода (понадобится позже)

# Исключаем лишние файлы из сборки
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor

# Плагины (для GitHub Pages они уже встроены)
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
